<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Form</title>
<style>
  :root{
    --ink:#2b241d;
    --paper:#f7f2e9;
    --line:#d8cdb8;
    --accent:#3f6b4f;
    --accent-dark:#2e4f39;
    --danger:#a3402f;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Georgia','Iowan Old Style',serif;
    line-height:1.5;
    padding-bottom:80px;
  }
  header{
    padding:32px 20px 20px;
    text-align:center;
    border-bottom:2px solid var(--line);
  }
  header h1{
    margin:0 0 6px;
    font-size:1.9rem;
    letter-spacing:0.02em;
  }
  header p{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.85rem;
    color:#6b6152;
    text-transform:uppercase;
    letter-spacing:0.12em;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:24px 16px 0;
  }
  section{margin-bottom:32px;}
  .section-label{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--accent-dark);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .catalog{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:14px;
  }
  .item{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:14px;
    cursor:pointer;
    transition:border-color .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .item.selected{
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent);
  }
  .item-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
  }
  .item-name{font-weight:bold;font-size:1.02rem;}
  .item-price{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.85rem;
    color:var(--accent-dark);
    white-space:nowrap;
  }
  .item-desc{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.82rem;
    color:#726a5c;
  }
  .qty-row{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.85rem;
    margin-top:4px;
  }
  .qty-row button{
    width:26px;height:26px;
    border-radius:4px;
    border:1px solid var(--line);
    background:var(--paper);
    font-size:1rem;
    cursor:pointer;
  }
  .qty-row span{min-width:18px;text-align:center;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.8rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:#6b6152;
    margin-bottom:5px;
  }
  .field input, .field textarea{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:5px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.95rem;
    background:var(--card);
  }
  .location-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px;
  }
  .location-status{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.85rem;
    color:#726a5c;
    margin-bottom:10px;
  }
  .location-status.ok{color:var(--accent-dark);}
  .location-status.err{color:var(--danger);}
  .coords{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.82rem;
    color:var(--ink);
    margin-top:8px;
    display:none;
  }
  button.primary{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:11px 18px;
    border-radius:5px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.9rem;
    font-weight:bold;
    letter-spacing:0.02em;
    cursor:pointer;
  }
  button.primary:hover{background:var(--accent-dark);}
  button.primary:disabled{background:#b7ae9c;cursor:not-allowed;}
  .submit-bar{
    max-width:640px;
    margin:0 auto;
    padding:0 16px 40px;
  }
  .submit-bar button{width:100%;padding:14px;font-size:1rem;}
  .summary{
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.85rem;
    color:#726a5c;
    margin-bottom:10px;
  }
  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%);
    background:var(--accent-dark);
    color:#fff;
    padding:12px 20px;
    border-radius:6px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.9rem;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
  }
  .toast.show{opacity:1;}
  .config-note{
    max-width:640px;
    margin:0 auto 24px;
    padding:12px 16px;
    background:#fff8e6;
    border:1px solid #e6d38a;
    border-radius:6px;
    font-family:Arial, Helvetica, sans-serif;
    font-size:0.8rem;
    color:#6b5a1d;
  }
  .config-note code{background:#f2e7bd;padding:1px 4px;border-radius:3px;}
</style>
</head>
<body>

<header>
  <h1>Farm Stand Order Form</h1>
  <p>Select items · Share your location · Submit your order</p>
</header>

<main>

  <section>
    <div class="section-label">Catalog</div>
    <div class="catalog" id="catalog"></div>
  </section>

  <section>
    <div class="section-label">Your details</div>
    <div class="field">
      <label for="custName">Name</label>
      <input type="text" id="custName" placeholder="Your full name">
    </div>
    <div class="field">
      <label for="custPhone">Phone</label>
      <input type="tel" id="custPhone" placeholder="Your phone number">
    </div>
    <div class="field">
      <label for="custNotes">Notes (optional)</label>
      <textarea id="custNotes" rows="2" placeholder="Anything else we should know"></textarea>
    </div>
  </section>

  <section>
    <div class="section-label">Delivery location</div>
    <div class="location-box">
      <div class="location-status" id="locStatus">Location not captured yet.</div>
      <button class="primary" id="locBtn" type="button">📍 Capture my live location</button>
      <div class="coords" id="coords"></div>
    </div>
  </section>

</main>

<div class="submit-bar">
  <div class="summary" id="summary">No items selected.</div>
  <button class="primary" id="submitBtn" type="button" disabled>Submit order</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- 1. Catalog data — edit this to match your real products ---------- */
const CATALOG = [
  { id: 'tomatoes',  name: 'Heirloom Tomatoes', price: '₹120/kg', desc: 'Vine-ripened, mixed varieties' },
  { id: 'honey',     name: 'Raw Honey',         price: '₹350/jar', desc: '500g glass jar, single-source' },
  { id: 'eggs',      name: 'Farm Eggs',         price: '₹90/dozen', desc: 'Free-range, brown shell' },
  { id: 'greens',    name: 'Mixed Greens',      price: '₹60/bunch', desc: 'Spinach, kale, chard mix' },
  { id: 'bread',     name: 'Sourdough Loaf',    price: '₹180/loaf', desc: 'Baked fresh every morning' },
  { id: 'jam',       name: 'Seasonal Jam',      price: '₹220/jar',  desc: 'Small-batch, low sugar' },
];

const state = {
  items: {},      // id -> qty
  location: null, // {lat, lng, accuracy}
};

/* ---------- 2. Render catalog ---------- */
const catalogEl = document.getElementById('catalog');
CATALOG.forEach(item => {
  const card = document.createElement('div');
  card.className = 'item';
  card.dataset.id = item.id;
  card.innerHTML = `
    <div class="item-top">
      <div class="item-name">${item.name}</div>
      <div class="item-price">${item.price}</div>
    </div>
    <div class="item-desc">${item.desc}</div>
    <div class="qty-row">
      <button type="button" data-action="dec">−</button>
      <span data-role="qty">0</span>
      <button type="button" data-action="inc">+</button>
    </div>
  `;
  catalogEl.appendChild(card);

  const qtySpan = card.querySelector('[data-role="qty"]');
  const setQty = (q) => {
    q = Math.max(0, q);
    qtySpan.textContent = q;
    if (q > 0) { state.items[item.id] = q; card.classList.add('selected'); }
    else { delete state.items[item.id]; card.classList.remove('selected'); }
    updateSummary();
  };

  card.querySelector('[data-action="inc"]').addEventListener('click', (e) => {
    e.stopPropagation();
    setQty((state.items[item.id] || 0) + 1);
  });
  card.querySelector('[data-action="dec"]').addEventListener('click', (e) => {
    e.stopPropagation();
    setQty((state.items[item.id] || 0) - 1);
  });
});

function updateSummary(){
  const chosen = CATALOG.filter(i => state.items[i.id]);
  const summaryEl = document.getElementById('summary');
  if (chosen.length === 0){
    summaryEl.textContent = 'No items selected.';
  } else {
    summaryEl.textContent = chosen.map(i => `${i.name} × ${state.items[i.id]}`).join(', ');
  }
  refreshSubmitState();
}

/* ---------- 3. Live location capture ---------- */
const locBtn = document.getElementById('locBtn');
const locStatus = document.getElementById('locStatus');
const coordsEl = document.getElementById('coords');

locBtn.addEventListener('click', () => {
  if (!navigator.geolocation){
    locStatus.textContent = 'Geolocation is not supported by this browser.';
    locStatus.className = 'location-status err';
    return;
  }
  locStatus.textContent = 'Requesting permission…';
  locStatus.className = 'location-status';
  locBtn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.location = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy
      };
      locStatus.textContent = 'Location captured ✓';
      locStatus.className = 'location-status ok';
      coordsEl.style.display = 'block';
      coordsEl.textContent = `Lat: ${state.location.lat.toFixed(6)}, Lng: ${state.location.lng.toFixed(6)} (±${Math.round(state.location.accuracy)}m)`;
      locBtn.textContent = '📍 Re-capture location';
      locBtn.disabled = false;
      refreshSubmitState();
    },
    (err) => {
      locStatus.textContent = 'Could not get location: ' + err.message + '. Please allow location access and try again.';
      locStatus.className = 'location-status err';
      locBtn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
});

/* ---------- 4. Submit gating ---------- */
const submitBtn = document.getElementById('submitBtn');
function refreshSubmitState(){
  const hasItems = Object.keys(state.items).length > 0;
  const hasLocation = !!state.location;
  submitBtn.disabled = !(hasItems && hasLocation);
}

/* ---------- 5. Submit to Google Form ---------- */

/*
==================== GOOGLE FORM SETUP ====================
To connect this to a real Google Form:

1. Create a Google Form with fields matching what you want to collect, e.g.:
   - Name (short answer)
   - Phone (short answer)
   - Order (paragraph)
   - Notes (paragraph)
   - Latitude (short answer)
   - Longitude (short answer)

2. Click the 3-dot menu > "Get pre-filled link". Fill in dummy answers for
   every field, click "Get link", then copy that long URL.

3. That URL looks like:
   https://docs.google.com/forms/d/e/1FAIpQLSxxxxxxx/viewform?
   usp=pp_url&entry.111111=dummyname&entry.222222=dummyphone&...

   - The part before "/viewform" is your FORM_ID.
   - Each "entry.XXXXXX" is the field ID for that question.

4. Replace the placeholders below:
     FORM_ACTION_URL -> https://docs.google.com/forms/d/e/<FORM_ID>/formResponse
     ENTRY_NAME      -> entry.111111 (your Name field's entry ID)
     ENTRY_PHONE     -> entry.222222
     ENTRY_ORDER     -> entry.333333
     ENTRY_NOTES     -> entry.444444
     ENTRY_LAT       -> entry.555555
     ENTRY_LNG       -> entry.666666

Google Forms doesn't allow cross-origin reads of the response, so we submit
using mode: 'no-cors'. This means we can't confirm success from the response
itself — we just show a success message once the request has been sent.
This is normal and expected for this integration technique.
=============================================================
*/

const GOOGLE_FORM = {
  actionUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSexG_3DTFgvo_yhYOZrr_sCzol6IG1R_E_mn2rhanXng7mhkg/formResponse',
  entries: {
    name:   'entry.1257323036',
    phone:  'entry.1516375754',
    order:  'entry.902698989',
    notes:  'entry.512205019',
    lat:    'entry.2062557045',
    lng:    'entry.922857659',
  }
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

submitBtn.addEventListener('click', async () => {
  const chosen = CATALOG.filter(i => state.items[i.id]);
  const orderText = chosen.map(i => `${i.name} x${state.items[i.id]}`).join('; ');
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const notes = document.getElementById('custNotes').value.trim();

  const notConfigured = GOOGLE_FORM.actionUrl === 'FORM_ACTION_URL';

  const payload = new URLSearchParams();
  payload.append(GOOGLE_FORM.entries.name, name);
  payload.append(GOOGLE_FORM.entries.phone, phone);
  payload.append(GOOGLE_FORM.entries.order, orderText);
  payload.append(GOOGLE_FORM.entries.notes, notes);
  payload.append(GOOGLE_FORM.entries.lat, state.location.lat);
  payload.append(GOOGLE_FORM.entries.lng, state.location.lng);

  if (notConfigured){
    showToast('Demo mode: fill in GOOGLE_FORM settings in the code to actually submit.');
    console.log('Would submit:', Object.fromEntries(payload));
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting…';
  try {
    await fetch(GOOGLE_FORM.actionUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: payload.toString()
    });
    showToast('Order submitted. Thank you!');
    submitBtn.textContent = 'Submit order';
    refreshSubmitState();
  } catch (e) {
    showToast('Something went wrong. Please try again.');
    submitBtn.textContent = 'Submit order';
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
